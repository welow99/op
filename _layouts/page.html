---
layout: default
---

{% if page.title %}
<article class="article">
  <header class="article-header">
    <h1 class="article-title">{{ page.title }}</h1>
    {% if page.date %}
    <time class="article-date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%Y年%m月%d日" }}
    </time>
    {% endif %}
  </header>
  <div class="article-body">
    {{ content }}
  </div>
</article>
{% else %}
<article class="article">
  <div class="article-body">
    {{ content }}
  </div>
</article>
{% endif %}
